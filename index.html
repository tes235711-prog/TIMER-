<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Countdown 20 Juni 2026</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <section class="card">
      <div class="badge">Hitung Mundur</div>
      <h1>Pre-Order Program Kelas UTBK By Alternatifa</h1>
      <p class="subtitle">Bersiaplah! Waktu tersisa sampai tanggal penting ini.</p>
      <div class="countdown-grid" id="countdown">
        <div class="count-item">
          <span class="count-number" id="days">0</span>
          <span class="count-label">Hari</span>
        </div>
        <div class="count-item">
          <span class="count-number" id="hours">0</span>
          <span class="count-label">Jam</span>
        </div>
        <div class="count-item">
          <span class="count-number" id="minutes">0</span>
          <span class="count-label">Menit</span>
        </div>
        <div class="count-item">
          <span class="count-number" id="seconds">0</span>
          <span class="count-label">Detik</span>
        </div>
      </div>
      <p class="note">Target waktu: 20 Juni 2026, 00:00</p>
      <div class="finish-message" id="finishMessage">Selamat! Waktunya sudah tiba.</div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
